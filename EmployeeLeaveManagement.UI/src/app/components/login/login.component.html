<div class="page-container">

  <div class="header">
    <h1>Employee Leave Management System</h1>
  </div>

  <div class="login-container">

    <div class="login-box">

      <h2>Login</h2>

      <p class="subtitle">Sign in to continue</p>

      <form (ngSubmit)="login()">

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" [(ngModel)]="email" placeholder="Enter Email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" [(ngModel)]="password" placeholder="Enter Password" autocomplete="current-password" required>
        </div>

        <button type="submit">
          Login
        </button>

      </form>

    </div>

  </div>

</div>
